<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>G2 Teleprompter Plugin</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; padding: 16px; font-size: 13px; }
    #log div { padding: 3px 0; border-bottom: 1px solid #1e1e1e; }
    .ok   { color: #4ade80; }
    .err  { color: #f87171; }
    .info { color: #60a5fa; }
  </style>
</head>
<body>
  <b>G2 Teleprompter</b>
  <div id="log"></div>

<script type="module">
  import {
    waitForEvenAppBridge,
    TextContainerProperty,
    CreateStartUpPageContainer,
    TextContainerUpgrade,
    OsEventTypeList,
    EventSourceType
  } from './node_modules/@evenrealities/even_hub_sdk/dist/index.js';

  // ── Config ────────────────────────────────────────────────────────────────
  const SERVER_URL = 'wss://g2-teleprompter.onrender.com';
  const PAGE_SIZE  = 1500;

  // ── State ─────────────────────────────────────────────────────────────────
  let bridge         = null;
  let ws             = null;
  let containerReady = false;
  let reconnectTimer = null;
  let displayBusy    = false;   // prevent concurrent textContainerUpgrade calls

  let pages       = [];
  let currentPage = 0;

  // Menu: 'none' | 'main' | 'custom'
  let menuLevel = 'none';
  let menuIndex = 0;

  // ── Menus ─────────────────────────────────────────────────────────────────
  const MAIN_MENU = [
    { label: '↩  Back to script',   action: 'back'       },
    { label: '✓  Ready',            action: 'ready'      },
    { label: '⏸  Need a moment',    action: 'moment'     },
    { label: '✓  Done reading',     action: 'done'       },
    { label: '📷  Camera on',        action: 'cam-on'     },
    { label: '📷  Camera off',       action: 'cam-off'    },
    { label: '✏  Custom message ›', action: 'custom-menu'},
    { label: '✕  Exit app',         action: 'exit'       },
  ];

  const CUSTOM_MENU = [
    { label: '←  Back to menu',      action: 'back-menu'   },
    { label: '🚨  Something is wrong!', action: 'wrong'     },
    { label: '🔁  Can you repeat?',  action: 'repeat'      },
    { label: '⏩  Speed up',          action: 'faster'      },
    { label: '⏪  Slow down',         action: 'slower'      },
    { label: '✋  Stand by',          action: 'standby'     },
    { label: '👍  All good',          action: 'allgood'     },
  ];

  const ACTION_MESSAGES = {
    'ready'  : '✓ Ready',
    'moment' : '⏸ Need a moment',
    'done'   : '✓ Done reading',
    'cam-on' : '📷 Camera on',
    'cam-off': '📷 Camera off',
    'wrong'  : '🚨 Something is wrong!',
    'repeat' : '🔁 Can you repeat?',
    'faster' : '⏩ Speed up',
    'slower' : '⏪ Slow down',
    'standby': '✋ Stand by',
    'allgood': '👍 All good',
  };

  // ── Debug log ─────────────────────────────────────────────────────────────
  function log(msg, type = 'info') {
    console.log(msg);
    const el = document.createElement('div');
    el.className = type;
    el.textContent = new Date().toLocaleTimeString() + '  ' + msg;
    document.getElementById('log').prepend(el);
  }

  // ── Paging ────────────────────────────────────────────────────────────────
  function splitIntoPages(text) {
    const chunks = [];
    let remaining = text.trim();
    while (remaining.length > 0) {
      if (remaining.length <= PAGE_SIZE) { chunks.push(remaining); break; }
      let cut = remaining.lastIndexOf(' ', PAGE_SIZE);
      if (cut === -1) cut = remaining.lastIndexOf('\n', PAGE_SIZE);
      if (cut === -1) cut = PAGE_SIZE;
      chunks.push(remaining.slice(0, cut).trimEnd());
      remaining = remaining.slice(cut).trimStart();
    }
    return chunks;
  }

  // ── Display ───────────────────────────────────────────────────────────────
  async function setDisplay(content) {
    if (!bridge || !containerReady) return;
    if (displayBusy) return;   // never send concurrent updates
    displayBusy = true;
    try {
      await bridge.textContainerUpgrade(new TextContainerUpgrade({
        containerID  : 1,
        containerName: 'teleprompter',
        content      : content.slice(0, 2000)
      }));
    } catch (e) {
      log('Display error: ' + e.message, 'err');
    } finally {
      displayBusy = false;
    }
  }

  async function showPage(index, loop = false) {
    if (pages.length === 0) return;
    if (loop) {
      currentPage = ((index % pages.length) + pages.length) % pages.length;
    } else {
      currentPage = Math.max(0, Math.min(index, pages.length - 1));
    }
    const indicator = pages.length > 1 ? `\n\n— ${currentPage + 1} / ${pages.length} —` : '';
    await setDisplay(pages[currentPage] + indicator);
    log(`Page ${currentPage + 1}/${pages.length}`, 'ok');
  }

  // ── Menu rendering ────────────────────────────────────────────────────────
  function renderMenu(items, title = '━━━ MENU ━━━') {
    const lines = [title, ''];
    items.forEach((item, i) => {
      lines.push((i === menuIndex ? '▶  ' : '    ') + item.label);
    });
    lines.push('', '─────────────────', 'scroll · navigate    tap · select');
    return lines.join('\n');
  }

  async function openMenu(level) {
    menuLevel = level;
    menuIndex = 0;
    const items = level === 'custom' ? CUSTOM_MENU : MAIN_MENU;
    const title = level === 'custom' ? '━━━ CUSTOM ━━━' : '━━━ MENU ━━━';
    await setDisplay(renderMenu(items, title));
    log('Menu: ' + level);
  }

  async function scrollMenu(dir) {
    const items = menuLevel === 'custom' ? CUSTOM_MENU : MAIN_MENU;
    menuIndex = (menuIndex + dir + items.length) % items.length;
    const title = menuLevel === 'custom' ? '━━━ CUSTOM ━━━' : '━━━ MENU ━━━';
    await setDisplay(renderMenu(items, title));
  }

  async function confirmMenu() {
    const items  = menuLevel === 'custom' ? CUSTOM_MENU : MAIN_MENU;
    const action = items[menuIndex].action;

    if (action === 'back') {
      menuLevel = 'none';
      await showPage(currentPage);
    } else if (action === 'back-menu') {
      await openMenu('main');
    } else if (action === 'custom-menu') {
      await openMenu('custom');
    } else if (action === 'exit') {
      log('Exiting…');
      await bridge.shutDownPageContainer(1);   // mode 1 = native confirm dialog
    } else if (ACTION_MESSAGES[action]) {
      const text = ACTION_MESSAGES[action];
      sendResponse(text);
      menuLevel = 'none';
      await setDisplay(`Sent:\n${text}\n\nReturning to script…`);
      setTimeout(() => showPage(currentPage), 1500);
      log('Sent: ' + text, 'ok');
    }
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function sendResponse(text) {
    if (ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'response', text }));
    }
  }

  function connectWS() {
    if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
    log('Connecting to server…');
    ws = new WebSocket(SERVER_URL);

    ws.onopen = () => {
      log('Server connected ✓', 'ok');
      clearTimeout(reconnectTimer);
      ws.send(JSON.stringify({ type: 'plugin-register' }));
    };

    ws.onmessage = ({ data }) => {
      try {
        const msg = JSON.parse(data);
        if (msg.type === 'teleprompter' && typeof msg.text === 'string') {
          pages = splitIntoPages(msg.text);
          currentPage = 0;
          menuLevel = 'none';
          log(`Script: ${pages.length} pages, ${msg.text.length} chars`);
          showPage(0);
        }
      } catch (e) {
        log('WS parse error: ' + e.message, 'err');
      }
    };

    ws.onclose = () => {
      log('Disconnected — retry in 5s', 'err');
      reconnectTimer = setTimeout(connectWS, 5000);
    };

    ws.onerror = () => { log('WS error', 'err'); ws.close(); };
  }

  // ── Event handling ────────────────────────────────────────────────────────
  function handleEvent(event) {
    // Log every raw event so we can see exactly what the glasses fire
    const raw = JSON.stringify({
      textEvt: event?.textEvent ? { type: event.textEvent.eventType } : null,
      sysEvt:  event?.sysEvent  ? { type: event.sysEvent.eventType, src: event.sysEvent.eventSource } : null,
    });
    log('EVT ' + raw);

    const type   = event?.textEvent?.eventType ?? event?.sysEvent?.eventType;
    const source = event?.sysEvent?.eventSource;
    const isRing = source === EventSourceType.TOUCH_EVENT_FROM_RING;

    // Lifecycle: handle app going to background or being killed by system
    if (type === OsEventTypeList.FOREGROUND_EXIT_EVENT ||
        type === OsEventTypeList.SYSTEM_EXIT_EVENT ||
        type === OsEventTypeList.ABNORMAL_EXIT_EVENT) {
      log('App exiting (event: ' + type + ')');
      return;
    }

    if (type === undefined) return;

    if (menuLevel !== 'none') {
      if (type === OsEventTypeList.SCROLL_BOTTOM_EVENT) {
        scrollMenu(+1);
      } else if (type === OsEventTypeList.SCROLL_TOP_EVENT) {
        scrollMenu(-1);
      } else if (
        type === OsEventTypeList.CLICK_EVENT ||
        type === OsEventTypeList.DOUBLE_CLICK_EVENT ||
        isRing
      ) {
        confirmMenu();
      }
    } else {
      if (type === OsEventTypeList.SCROLL_BOTTOM_EVENT) {
        showPage(currentPage + 1, false);
      } else if (type === OsEventTypeList.SCROLL_TOP_EVENT) {
        showPage(currentPage - 1, false);
      } else if (type === OsEventTypeList.DOUBLE_CLICK_EVENT) {
        // Double-tap = next page, loops
        showPage(currentPage + 1, true);
      } else if (type === OsEventTypeList.CLICK_EVENT || isRing) {
        openMenu('main');
      }
    }
  }

  // ── SDK init (with retry on out-of-memory) ────────────────────────────────
  async function initGlasses(attempt = 1) {
    try {
      log('Waiting for bridge…');
      bridge = await waitForEvenAppBridge();
      log('Bridge ready ✓', 'ok');

      const textContainer = new TextContainerProperty({
        xPosition    : 0,
        yPosition    : 0,
        width        : 576,
        height       : 288,
        borderWidth  : 0,
        borderColor  : 5,
        paddingLength: 6,
        containerID  : 1,
        containerName: 'teleprompter',
        content      : 'Teleprompter ready.\nWaiting for a script...\n\nTap · menu\nDouble-tap · next page',
        isEventCapture: 1
      });

      const page = new CreateStartUpPageContainer({
        containerTotalNum: 1,
        textObject: [textContainer]
      });

      log(`Creating container (attempt ${attempt})…`);
      const result = await bridge.createStartUpPageContainer(page);

      // result: 0=ok, 1=invalid, 2=oversize, 3=out-of-memory
      if (result === 0) {
        containerReady = true;
        bridge.onEvenHubEvent(handleEvent);
        log('Container ready ✓', 'ok');
      } else if (result === 3 && attempt < 3) {
        // Out of memory — wait and retry
        log(`Out of memory, retrying in 2s… (attempt ${attempt})`, 'err');
        await new Promise(r => setTimeout(r, 2000));
        return initGlasses(attempt + 1);
      } else {
        log(`Container failed: result=${result}`, 'err');
      }
    } catch (e) {
      log('Init failed: ' + e.message, 'err');
    }
  }

  // ── Start ─────────────────────────────────────────────────────────────────
  log('Starting…');
  await initGlasses();
  connectWS();
</script>
</body>
</html>
