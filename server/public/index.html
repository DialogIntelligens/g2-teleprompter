<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G2 Teleprompter — Send Script</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #f0f0f0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a1a; border: 1px solid #2e2e2e; border-radius: 16px;
      padding: 36px 32px; width: 100%; max-width: 560px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
    textarea, input[type="password"] {
      width: 100%; background: #111; border: 1px solid #333; border-radius: 10px;
      color: #f0f0f0; font-size: 1rem; padding: 12px 14px; resize: vertical;
      outline: none; transition: border-color .2s;
    }
    textarea { min-height: 180px; margin-bottom: 16px; font-family: inherit; line-height: 1.6; }
    input[type="password"] { margin-bottom: 20px; }
    textarea:focus, input:focus { border-color: #555; }
    button {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: #2563eb; color: #fff; font-size: 1.05rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover:not(:disabled) { background: #1d4ed8; }
    button:disabled { background: #333; color: #666; cursor: default; }
    .status {
      margin-top: 16px; padding: 12px 14px; border-radius: 10px;
      font-size: 0.9rem; display: none;
    }
    .status.ok    { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .status.error { background: #2d0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .chars { font-size: 0.8rem; color: #555; text-align: right; margin-top: -12px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎬 G2 Teleprompter</h1>
  <p class="subtitle">Type a script below — it will appear on the glasses instantly.</p>

  <label for="script">Script</label>
  <textarea id="script" placeholder="Enter the teleprompter text here..."></textarea>
  <div class="chars"><span id="charCount">0</span> characters</div>

  <label for="secret">Password (if set)</label>
  <input type="password" id="secret" placeholder="Leave blank if no password" />

  <button id="sendBtn" onclick="sendScript()">Send to Glasses</button>
  <div class="status" id="status"></div>
</div>

<script>
  const textarea = document.getElementById('script');
  textarea.addEventListener('input', () => {
    document.getElementById('charCount').textContent = textarea.value.length;
  });

  async function sendScript() {
    const text   = textarea.value.trim();
    const secret = document.getElementById('secret').value;
    const btn    = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    if (!text) { showStatus('Please enter some text first.', 'error'); return; }

    btn.disabled    = true;
    btn.textContent = 'Sending…';
    status.style.display = 'none';

    try {
      const body = { text };
      if (secret) body.secret = secret;

      const res  = await fetch('/send', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify(body)
      });
      const data = await res.json();

      if (res.ok) {
        showStatus(
          data.deliveredTo > 0
            ? `✓ Delivered to ${data.deliveredTo} glasses!`
            : '⚠ Sent, but no glasses are currently connected.',
          data.deliveredTo > 0 ? 'ok' : 'error'
        );
      } else {
        showStatus(`Error: ${data.error || 'Unknown error'}`, 'error');
      }
    } catch (e) {
      showStatus('Network error — is the server reachable?', 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Send to Glasses';
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent     = msg;
    el.className       = `status ${type}`;
    el.style.display   = 'block';
  }
</script>
</body>
</html>
